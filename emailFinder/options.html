<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eMail Address Finder - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>eMail Address Finder Settings</h1>

    <section class="settings-section">
      <h2>Menu Layout</h2>
      <p class="section-description">Choose where individual email addresses appear in the menu</p>
      <fieldset class="radio-group">
        <label class="radio-option">
          <input type="radio" name="individualEmailsPosition" value="bottom" checked>
          Below copy actions (default)
        </label>
        <label class="radio-option">
          <input type="radio" name="individualEmailsPosition" value="top">
          Above copy actions
        </label>
      </fieldset>
    </section>

    <section class="settings-section">
      <h2>Exclude Email Addresses</h2>
      <p class="section-description">Enter email addresses to exclude from results (one per line)</p>
      <textarea id="addressBlacklist" placeholder="user@example.com&#10;test@domain.com" rows="6"></textarea>
    </section>

    <section class="settings-section">
      <h2>Exclude Domains</h2>
      <p class="section-description">Enter domain names to exclude from results (one per line)</p>
      <textarea id="domainBlacklist" placeholder="example.com&#10;domain.com" rows="6"></textarea>
    </section>

    <div class="button-group">
      <button id="saveButton" class="button button-primary">Save Settings</button>
      <button id="resetButton" class="button button-secondary">Reset to Defaults</button>
    </div>

    <div id="statusMessage" class="status-message"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
